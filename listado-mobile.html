<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Propiedades — Inmobiliaria Prueba</title>
  <meta name="description" content="Explora nuestro catálogo de propiedades exclusivas en España.">
  <meta name="theme-color" content="#1C3A2F">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-mobile.css">
</head>
<body class="font-body bg-bg text-text">

<!-- ===== TOP HEADER ===== -->
<header class="m-header light">
  <a href="index-mobile.html" class="m-logo">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px;height:16px;stroke-width:2;display:inline;vertical-align:middle;margin-right:4px;color:var(--brand);"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    Propiedades
  </a>
  <div class="m-header-actions">
    <!-- Search toggle -->
    <button class="m-icon-btn" onclick="document.getElementById('m-search-bar-top').style.display=document.getElementById('m-search-bar-top').style.display==='none'?'block':'none'" aria-label="Buscar">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:18px;height:18px;stroke-width:2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </button>
    <!-- Filters -->
    <button class="m-icon-btn" onclick="openFilters()" aria-label="Filtros">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:18px;height:18px;stroke-width:2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707l-6.414 6.414A1 1 0 0114 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 018 21v-7.586a1 1 0 00-.293-.707L1.293 6.707A1 1 0 011 6V4z"/></svg>
    </button>
  </div>
</header>

<!-- Search bar (toggleable) -->
<div id="m-search-bar-top" style="display:none;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:9;">
  <input type="text" id="search-text" placeholder="Buscar propiedades..." class="m-search-input">
</div>

<!-- ===== FILTER CHIPS ===== -->
<div class="m-filter-bar">
  <button class="m-filter-chip active" onclick="setFilterChip(this,'all')" data-filter-quick="all">Todos</button>
  <button class="m-filter-chip" onclick="setFilterChip(this,'venta')" data-filter-quick="venta">Venta</button>
  <button class="m-filter-chip" onclick="setFilterChip(this,'alquiler')" data-filter-quick="alquiler">Alquiler</button>
  <button class="m-filter-chip" onclick="setFilterChip(this,'piso')" data-filter-type="piso">Pisos</button>
  <button class="m-filter-chip" onclick="setFilterChip(this,'casa')" data-filter-type="casa">Casas</button>
  <button class="m-filter-chip" onclick="setFilterChip(this,'villa')" data-filter-type="villa">Villas</button>
  <button class="m-filter-chip" onclick="setFilterChip(this,'local')" data-filter-type="local">Locales</button>
</div>

<!-- ===== MAIN ===== -->
<main style="padding:16px 16px 20px;">
  <!-- Results count -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <p style="font-size:0.82rem;color:var(--muted);">
      <span id="results-count">—</span> propiedades encontradas
    </p>
    <div style="display:flex;gap:6px;">
      <button onclick="setSortMobile('precio-asc')" id="sort-btn" style="font-size:0.75rem;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--muted);display:flex;align-items:center;gap:4px;">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:12px;height:12px;stroke-width:2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"/></svg>
        Ordenar
      </button>
    </div>
  </div>

  <!-- Property list -->
  <div id="prop-list"><!-- Renderizado por JS --></div>

  <!-- Load more -->
  <button id="load-more-btn" onclick="loadMore()" style="width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;background:transparent;color:var(--brand);font-family:'DM Sans',system-ui,sans-serif;font-size:0.9rem;font-weight:600;margin-top:8px;display:none;">
    Cargar más propiedades
  </button>
</main>

<!-- ===== FILTER DRAWER ===== -->
<div class="m-filter-drawer" id="m-filter-drawer">
  <div class="m-filter-backdrop" onclick="closeFilters()"></div>
  <div class="m-filter-panel">
    <div class="m-filter-handle"></div>
    <div style="padding:0 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:1.3rem;font-weight:400;">Filtros</h3>
      <button onclick="clearFilters();closeFilters();" style="font-size:0.8rem;color:var(--muted);text-decoration:underline;background:none;border:none;cursor:pointer;">Limpiar todo</button>
    </div>

    <!-- Operación -->
    <div class="m-filter-section">
      <span class="m-filter-label">Operación</span>
      <div class="m-filter-options">
        <button class="m-filter-option" onclick="toggleFilterOption(this,'operacion','venta')" data-key="operacion" data-val="venta">Venta</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'operacion','alquiler')" data-key="operacion" data-val="alquiler">Alquiler</button>
      </div>
    </div>

    <!-- Tipo -->
    <div class="m-filter-section">
      <span class="m-filter-label">Tipo</span>
      <div class="m-filter-options">
        <button class="m-filter-option" onclick="toggleFilterOption(this,'tipo','piso')" data-key="tipo" data-val="piso">Piso</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'tipo','casa')" data-key="tipo" data-val="casa">Casa</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'tipo','villa')" data-key="tipo" data-val="villa">Villa</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'tipo','local')" data-key="tipo" data-val="local">Local</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'tipo','oficina')" data-key="tipo" data-val="oficina">Oficina</button>
      </div>
    </div>

    <!-- Ciudad -->
    <div class="m-filter-section">
      <span class="m-filter-label">Ciudad</span>
      <div class="m-filter-options" id="city-filter-options">
        <button class="m-filter-option" onclick="toggleFilterOption(this,'ciudad','Madrid')" data-key="ciudad" data-val="Madrid">Madrid</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'ciudad','Barcelona')" data-key="ciudad" data-val="Barcelona">Barcelona</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'ciudad','Marbella')" data-key="ciudad" data-val="Marbella">Marbella</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'ciudad','Valencia')" data-key="ciudad" data-val="Valencia">Valencia</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'ciudad','Sevilla')" data-key="ciudad" data-val="Sevilla">Sevilla</button>
      </div>
    </div>

    <!-- Precio máximo -->
    <div class="m-filter-section">
      <span class="m-filter-label">Precio máximo</span>
      <input type="range" id="price-max" min="0" max="5000000" step="50000" value="5000000" class="mort-slider" style="margin:8px 0;" oninput="updatePriceLabel(this)">
      <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted);">
        <span>0 €</span>
        <span id="price-max-label">5.000.000 €</span>
      </div>
    </div>

    <!-- Habitaciones mínimas -->
    <div class="m-filter-section">
      <span class="m-filter-label">Habitaciones mínimas</span>
      <div class="m-filter-options">
        <button class="m-filter-option" onclick="toggleFilterOption(this,'bedrooms','1')" data-key="bedrooms" data-val="1">1+</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'bedrooms','2')" data-key="bedrooms" data-val="2">2+</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'bedrooms','3')" data-key="bedrooms" data-val="3">3+</button>
        <button class="m-filter-option" onclick="toggleFilterOption(this,'bedrooms','4')" data-key="bedrooms" data-val="4">4+</button>
      </div>
    </div>

    <div style="padding:0 20px;">
      <button onclick="applyFiltersMobile();closeFilters();" class="m-btn-primary" style="width:100%;">Ver resultados</button>
    </div>
  </div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<nav class="m-bottom-nav">
  <a href="index-mobile.html" class="m-nav-item">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Inicio
  </a>
  <a href="listado-mobile.html" class="m-nav-item active">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    Buscar
  </a>
  <a href="sobre-nosotros-mobile.html" class="m-nav-item">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Nosotros
  </a>
  <a href="contacto-mobile.html" class="m-nav-item">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
    Contacto
  </a>
</nav>

<script src="properties.js"></script>
<script src="main.js"></script>
<script>
  // Mobile-specific filters
  const mobileFilters = { operacion: null, tipo: null, ciudad: null, bedrooms: null, priceMax: 5000000 };
  let allPropsFiltered = [];
  let visibleCount = 8;
  let currentSort = 'precio-asc';

  function getMobileFilteredProps() {
    let list = [...properties];
    const params = new URLSearchParams(window.location.search);

    // URL params
    const qParam = params.get('q') || '';
    const tipoParam = params.get('tipo') || mobileFilters.tipo;
    const opParam = params.get('operacion') || mobileFilters.operacion;
    const ciudadParam = params.get('ciudad') || mobileFilters.ciudad;
    const bedsParam = mobileFilters.bedrooms;

    if (qParam) {
      const q = qParam.toLowerCase();
      list = list.filter(p => (localText(p.title)+localText(p.address)+p.city).toLowerCase().includes(q));
    }
    if (tipoParam) list = list.filter(p => p.type === tipoParam || p.propertyType === tipoParam);
    if (opParam) list = list.filter(p => p.type === opParam);
    if (ciudadParam) list = list.filter(p => p.city === ciudadParam || localText(p.address).toLowerCase().includes(ciudadParam.toLowerCase()));
    if (bedsParam) list = list.filter(p => (p.bedrooms || 0) >= parseInt(bedsParam));
    list = list.filter(p => p.price <= mobileFilters.priceMax);

    // Sort
    if (currentSort === 'precio-asc') list.sort((a,b) => a.price - b.price);
    else if (currentSort === 'precio-desc') list.sort((a,b) => b.price - a.price);
    else if (currentSort === 'recent') list.sort((a,b) => (b.id||0) - (a.id||0));

    return list;
  }

  function renderPropList() {
    const list = getMobileFilteredProps();
    allPropsFiltered = list;
    const container = document.getElementById('prop-list');
    const countEl = document.getElementById('results-count');
    if (countEl) countEl.textContent = list.length;

    const visible = list.slice(0, visibleCount);
    container.innerHTML = visible.map(p => `
      <div class="m-prop-card" onclick="location.href='propiedad-mobile.html?id=${p.id}'">
        <img src="${p.photos[0]}" alt="${localText(p.title)}" loading="lazy" width="400" height="200" class="m-prop-card-img">
        <div class="m-prop-card-body">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <span class="m-prop-price prop-price" data-price-eur="${p.price}" data-price-rent="${p.type==='alquiler'}">${p.type === 'alquiler' ? formatPriceRent(p.price) : formatPrice(p.price)}</span>
            <span class="badge badge-${p.type}" style="font-size:0.65rem;">${t(p.type)}</span>
          </div>
          <div class="m-prop-title">${localText(p.title)}</div>
          <div class="m-prop-address">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:12px;height:12px;stroke-width:2;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
            ${localText(p.address)}
          </div>
          <div class="m-prop-features">
            ${p.m2 ? `<span class="m-prop-feature">${p.m2} m²</span>` : ''}
            ${p.bedrooms ? `<span class="m-prop-feature">${p.bedrooms} hab.</span>` : ''}
            ${p.bathrooms ? `<span class="m-prop-feature">${p.bathrooms} baños</span>` : ''}
          </div>
        </div>
      </div>`).join('');

    const loadMoreBtn = document.getElementById('load-more-btn');
    if (loadMoreBtn) loadMoreBtn.style.display = list.length > visibleCount ? 'block' : 'none';
  }

  function loadMore() {
    visibleCount += 6;
    renderPropList();
  }

  function setSortMobile(sort) {
    currentSort = sort === currentSort ? 'precio-desc' : sort;
    renderPropList();
  }

  function openFilters() {
    const drawer = document.getElementById('m-filter-drawer');
    drawer.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeFilters() {
    const drawer = document.getElementById('m-filter-drawer');
    drawer.classList.remove('open');
    document.body.style.overflow = '';
  }

  function toggleFilterOption(btn, key, val) {
    const isSelected = btn.classList.contains('selected');
    // Deselect siblings in same key group
    document.querySelectorAll(`[data-key="${key}"]`).forEach(b => b.classList.remove('selected'));
    if (!isSelected) {
      btn.classList.add('selected');
      mobileFilters[key] = val;
    } else {
      mobileFilters[key] = null;
    }
  }

  function applyFiltersMobile() {
    visibleCount = 8;
    renderPropList();
  }

  function clearFilters() {
    Object.keys(mobileFilters).forEach(k => { mobileFilters[k] = k === 'priceMax' ? 5000000 : null; });
    document.querySelectorAll('.m-filter-option').forEach(b => b.classList.remove('selected'));
    const priceSlider = document.getElementById('price-max');
    if (priceSlider) { priceSlider.value = 5000000; updatePriceLabel(priceSlider); }
    visibleCount = 8;
    renderPropList();
  }

  function updatePriceLabel(slider) {
    mobileFilters.priceMax = parseInt(slider.value);
    const label = document.getElementById('price-max-label');
    if (label) label.textContent = parseInt(slider.value).toLocaleString('es-ES') + ' €';
  }

  function setFilterChip(btn, val) {
    document.querySelectorAll('.m-filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (val === 'all') { mobileFilters.operacion = null; mobileFilters.tipo = null; }
    else if (val === 'venta' || val === 'alquiler') { mobileFilters.operacion = val; mobileFilters.tipo = null; }
    else { mobileFilters.tipo = val; mobileFilters.operacion = null; }
    visibleCount = 8;
    renderPropList();
  }

  // Init search input
  const searchInput = document.getElementById('search-text');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      visibleCount = 8;
      renderPropList();
    });
  }

  // Read URL params on load
  const params = new URLSearchParams(window.location.search);
  if (params.get('tipo')) mobileFilters.tipo = params.get('tipo');
  if (params.get('operacion')) mobileFilters.operacion = params.get('operacion');
  if (params.get('ciudad')) mobileFilters.ciudad = params.get('ciudad');

  renderPropList();
</script>
</body>
</html>
